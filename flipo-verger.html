<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flipo — Verger</title>
<style>
:root{--gr:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--bl:#185FA5;--am:#FFF3CD;--amb:#E6A817;--brd:#e0e0e0;--bg:#f7f7f5;--wh:#fff;--tx:#1a1a1a;--mu:#666;--mn:#d4edda;--mnd:#155724}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:var(--bg);color:var(--tx)}
.app{max-width:1300px;margin:0 auto;background:var(--wh);min-height:100vh;box-shadow:0 0 20px rgba(0,0,0,.07)}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:2px solid var(--gr);background:var(--wh)}
.logo{width:36px;height:36px;border-radius:10px;background:var(--gr);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.htxt h1{font-size:17px;font-weight:700;color:var(--gd)}.htxt p{font-size:11px;color:var(--mu)}
.tabs{display:flex;padding:0 20px;background:var(--wh);border-bottom:1px solid var(--brd)}
.tab{font-size:13px;padding:11px 18px;border:none;border-bottom:3px solid transparent;cursor:pointer;background:transparent;color:var(--mu);font-weight:500}
.tab.act{color:var(--gr);border-bottom-color:var(--gr)}
.tab.sec{color:#8B4513}.tab.sec.act{color:#8B4513;border-bottom-color:#8B4513}
.content{padding:20px}
.hidden{display:none!important}
.stabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.stab{font-size:12px;padding:5px 14px;border-radius:99px;border:1px solid var(--brd);cursor:pointer;background:var(--wh);color:var(--mu);font-weight:500}
.stab.act{background:var(--gr);color:#fff;border-color:var(--gr)}
.btn{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid var(--brd);cursor:pointer;background:var(--wh);color:var(--tx);display:inline-flex;align-items:center;gap:5px;font-weight:500;min-height:36px}
.btn:hover{background:var(--bg)}
.btn.pdf{background:var(--bl);color:#fff;border-color:var(--bl)}.btn.pdf:hover{background:#1450a0}
.btn.mail{background:#7c3aed;color:#fff;border-color:#5b21b6}.btn.mail:hover{background:#5b21b6}
.btn.add{background:var(--gl);color:var(--gd);border-color:var(--gr)}.btn.add:hover{background:#c5e8d8}
.btn.ok{background:var(--gr);color:#fff;border-color:var(--gd)}.btn.ok:hover{background:var(--gd)}
.btn.del{background:#fff0f0;color:#c0392b;border-color:#f5c6c6;padding:3px 8px;font-size:11px}.btn.del:hover{background:#fde8e8}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tw{overflow-x:auto;border:1px solid var(--brd);border-radius:10px;margin-bottom:10px}
.tw.fh{max-height:420px;overflow-y:auto}
table{border-collapse:collapse;width:100%;font-size:12px}
th{background:#f2f2f0;padding:7px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--brd);white-space:nowrap;position:sticky;top:0;z-index:2}
th.am{background:#FEF3CD} th.cost{background:#fce8d5}
td{padding:5px 8px;border-bottom:1px solid #f0f0ee;white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
td.f{background:var(--am)!important;color:#7a5200}
td.f input{color:#7a5200!important}
td.tt{background:#efefec!important;font-weight:700}
td.pos{background:#d4edda!important;color:#155724;font-weight:600}
td.neg{background:#fde8e8!important;color:#a32d2d;font-weight:600}
td.cost{background:#fce8d5!important;color:#7a3d00;font-weight:600}
td input{border:none;background:transparent;width:100%;font-size:12px;color:inherit;outline:none;padding:2px 3px}
td input:focus{background:rgba(255,255,255,.8);border-radius:3px;outline:1px solid var(--gr)}
td.f input:focus{background:rgba(255,255,255,.6)}
input.w48{width:48px} input.w60{width:60px} input.w80{width:80px} input.w100{width:100px} input.w120{width:120px}
select.wsel{border:none;background:transparent;font-size:12px;color:inherit;outline:none;padding:2px 3px;cursor:pointer;width:100%}
.sts{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.st{background:var(--bg);border-radius:10px;padding:12px 16px;flex:1;min-width:110px;border:1px solid var(--brd)}
.sl{font-size:11px;color:var(--mu);margin-bottom:3px}.sv{font-size:22px;font-weight:700;line-height:1}.su{font-size:11px;color:var(--mu)}
.info{background:var(--gl);border-left:3px solid var(--gr);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--gd);margin-bottom:12px;line-height:1.5}
.leg{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--mu);margin-bottom:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px}
.lb{width:13px;height:13px;border-radius:3px;border:1px solid var(--brd)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:99px;background:#fef3c7;color:#854F0B;font-weight:600}
.stitle{font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-top:14px;border-top:1px solid var(--brd)}
.note{font-size:10px;color:var(--mu);font-style:italic;margin-left:4px}
.rb{font-size:9px;padding:1px 4px;border-radius:3px;border:1px solid #ccc;background:transparent;cursor:pointer;color:var(--mu);vertical-align:middle;margin-left:2px}
.rb:hover{background:var(--gl)}
.chart-wrap{background:var(--bg);border-radius:10px;padding:16px;border:1px solid var(--brd)}
.chart-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.wbtn{font-size:12px;padding:4px 12px;border-radius:99px;border:1px solid var(--brd);cursor:pointer;background:transparent;color:var(--mu)}
.wbtn.act{background:var(--gr);color:#fff;border-color:var(--gr)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.mc{background:var(--wh);border-radius:14px;max-width:780px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.mh h2{font-size:15px;font-weight:700;color:var(--gd)}
.mclose{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--brd)}
/* Entry form */
.cult-sel{display:flex;gap:10px;margin-bottom:14px}
.cult-btn{flex:1;padding:14px;border-radius:12px;border:2px solid var(--brd);cursor:pointer;background:var(--bg);font-size:15px;font-weight:600;text-align:center;transition:.15s}
.cult-btn:hover{border-color:var(--gr)}
.cult-btn.pom.act{background:#e8f5d4;border-color:#5a8a1a;color:#3a6e11}
.cult-btn.poi.act{background:#ddeaff;border-color:var(--bl);color:var(--bl)}
.entry-form{background:var(--bg);border-radius:12px;padding:16px;border:1px solid var(--brd);margin-bottom:16px}
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:11px;color:var(--mu);font-weight:500}
.form-field input,.form-field select{padding:7px 10px;border:1px solid var(--brd);border-radius:7px;font-size:16px;background:var(--wh);color:var(--tx);outline:none}
.form-field input:focus,.form-field select:focus{border-color:var(--gr);box-shadow:0 0 0 2px rgba(29,158,117,.15)}
.form-field input.fw{width:100%}
.journal-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--brd);background:var(--wh);margin-bottom:6px}
.journal-row .jicon{font-size:18px}
.journal-row .jinfo{flex:1;font-size:12px}
.journal-row .jinfo strong{font-size:13px}
.journal-row .jdate{font-size:11px;color:var(--mu)}
.empty-journal{text-align:center;color:var(--mu);font-size:12px;padding:20px;background:var(--bg);border-radius:10px}
/* Share FAB */
.share-fab{position:fixed;bottom:22px;right:18px;display:flex;flex-direction:column;align-items:center;gap:9px;z-index:1000}
.share-pill{display:flex;gap:8px;background:#fff;border-radius:99px;padding:7px 12px;box-shadow:0 3px 16px rgba(0,0,0,.2);border:1px solid var(--brd)}
.share-pill-btn{border:none;background:transparent;cursor:pointer;font-size:19px;padding:2px 6px;border-radius:99px;transition:.15s;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--mu)}
.share-pill-btn:hover{background:var(--gl);color:var(--gd)}
.share-pill-sep{width:1px;background:var(--brd);align-self:stretch}
/* Mobile responsiveness */
@media(max-width:600px){
  .hdr{flex-wrap:wrap;gap:8px;padding:10px 12px}
  .htxt h1{font-size:14px}
  .htxt p{font-size:10px}
  #saison-hdr{font-size:9px}
  button[onclick*="syncPullVerger"]{font-size:10px;padding:3px 8px}
  .tabs{padding:0 12px;overflow-x:auto;flex-wrap:nowrap;gap:0}
  .tab{font-size:11px;padding:9px 12px;min-width:auto;white-space:nowrap}
  .tab.sec{font-size:11px}
  .content{padding:12px}
  .form-row{gap:8px}
  .form-field{min-width:auto}
  .form-field input,.form-field select{font-size:16px;padding:8px}
  .btn{font-size:11px;padding:6px 10px;min-height:44px}
  .btn.pdf,.btn.mail{font-size:11px}
  .stabs{gap:4px;margin-bottom:10px}
  .stab{font-size:11px;padding:4px 10px}
  .tw{margin-bottom:8px;border-radius:6px;overflow-x:auto}
  .tw.fh{max-height:300px}
  table{font-size:11px}
  th{padding:5px 6px;font-size:10px}
  td{padding:4px 5px;font-size:11px}
  input.w48,input.w60,input.w80{width:100%;max-width:60px}
  .cult-sel{gap:6px;margin-bottom:10px}
  .cult-btn{padding:10px;font-size:13px;border-radius:8px}
  .entry-form{padding:12px;margin-bottom:12px;border-radius:8px}
  .sts{gap:8px;margin-bottom:12px}
  .st{min-width:90px;padding:10px 12px;font-size:12px}
  .sv{font-size:18px}
  .info{font-size:11px;padding:8px 10px;margin-bottom:10px}
  .stitle{font-size:11px;margin:12px 0 6px}
  .chart-wrap{padding:12px;margin-bottom:10px}
  .share-fab{bottom:12px;right:12px}
  .share-pill{padding:6px 10px;gap:6px}
  .share-pill-btn{font-size:11px;padding:1px 4px;gap:3px}
  .badge{font-size:10px;padding:2px 6px}
  @supports(padding:max(0px)){.share-fab{bottom:max(12px,env(safe-area-inset-bottom));right:max(12px,env(safe-area-inset-right))}}
}
</style>
</head>

<div class="tabs">

</div>
<div class="content">
  <div id="panel-trait"></div>
  <div id="panel-cueill" class="hidden"></div>
  <div id="panel-stock" class="hidden"></div>
  <div id="panel-phyto" class="hidden"></div>
</div>
</div>
<div id="modal-root"></div>
<!-- Share FAB -->
<div class="share-fab">
  <div class="share-pill">
    <button class="share-pill-btn" onclick="shareNow('email')" title="Envoyer par e-mail">📧 Email</button>
    <div class="share-pill-sep"></div>
    <button class="share-pill-btn" onclick="shareNow('sms')" title="Envoyer par SMS">📱 SMS</button>
  </div>
</div>
<datalist id="prod-list"></datalist>

function R2(v,n=2){return Math.round(v*Math.pow(10,n))/Math.pow(10,n);}
function eau(s){return Math.ceil(500*parseFloat(s||0)/50)*50;}
function sm(a){return a.reduce((x,y)=>x+(parseFloat(y)||0),0);}
function fr(n){return (parseFloat(n)||0).toLocaleString('fr-FR',{maximumFractionDigits:2});}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function $(id){return document.getElementById(id);}
function setText(id,v){const e=$(id);if(e)e.textContent=v;}
function saveFocus(){const e=document.activeElement;return e?{id:e.id,v:e.value,s:e.selectionStart,en:e.selectionEnd}:null;}
function restFocus(f){if(!f||!f.id)return;const e=$(f.id);if(e){e.focus();try{e.setSelectionRange(f.s,f.en);}catch(_){}}}

// Prix lookup depuis le tarif phyto
function getPrix(productName){
  const pn=(productName||'').toLowerCase().replace(/\s+/g,' ').trim();
  const found=S.tarif.find(t=>{
    const tn=(t.p||'').toLowerCase().replace(/\s+/g,' ').trim();
    return tn===pn||pn.startsWith(tn)||tn.startsWith(pn);
  });
  return found?found.px:0;
}

// Recherche de dose pré-remplie pour un produit
function lookupDose(nom){
  if(!nom||!nom.trim())return null;
  var n=nom.trim().toLowerCase();
  // Chercher dans les tableaux locaux
  var sources=[].concat(S.pcPom||[],S.pcPoi||[],S.pcNoy||[]);
  for(var i=0;i<sources.length;i++){
    var p=sources[i];
    var pNom=(p.p||'').toLowerCase();
    var dose=p.d?p.d[2]:0;
    if(pNom===n&&dose>0)return dose;
  }
  // Chercher dans les autres modules via localStorage
  try {
    var vergerData=JSON.parse(localStorage.getItem('flipo-verger-v2')||'{}');
    var all=[].concat(vergerData.pcPom||[],vergerData.pcPoi||[],vergerData.pcNoy||[]);
    for(var j=0;j<all.length;j++){
      if((all[j].p||'').toLowerCase()===n&&all[j].d&&all[j].d[2]>0)return all[j].d[2];
    }
    var marData=JSON.parse(localStorage.getItem('flipo-maraichage-v2')||'{}');
    if(marData.traitements){
      for(var c in marData.traitements){
        var traits=marData.traitements[c];
        if(Array.isArray(traits)){
          for(var k=0;k<traits.length;k++){
            if((traits[k].p||'').toLowerCase()===n&&traits[k].doseHa>0)return traits[k].doseHa;
          }
        }
      }
    }
    var fraiData=JSON.parse(localStorage.getItem('flipo-fraise-v1')||'{}');
    if(fraiData.traitements&&Array.isArray(fraiData.traitements)){
      for(var m=0;m<fraiData.traitements.length;m++){
        if((fraiData.traitements[m].produit||'').toLowerCase()===n&&fraiData.traitements[m].doseHa>0)return fraiData.traitements[m].doseHa;
      }
    }
  } catch(e){}
  return null;
}

// Coût total pour un bloc (somme produits × prix)
function coutBloc(culture,bi){
  const pc=culture==='pomme'?S.pcPom:culture==='poire'?S.pcPoi:S.pcNoy;
  const dist=culture==='pomme'?S.pd:culture==='poire'?S.qd:S.nd;
  const blocs=culture==='pomme'?S.bp:culture==='poire'?S.br:S.bn;
  return R2(pc.reduce((sum,row,ri)=>{
    const k=`${ri}-${bi}`;
    const dose=dist[k]!==undefined?dist[k]:R2(row.d[2]*blocs[bi].s);
    return sum+dose*getPrix(row.p);
  },0));
}

function initTrait(){$('panel-trait').innerHTML=buildTrait();}
function buildTrait(){return buildTraitStabs()+`<div id="tc">${buildTC()}</div>`;}
function buildTraitStabs(){
  var allTabs=[{id:'pc',l:'Par Culture'},{id:'pomme',l:'🍎 Pomme'},{id:'poire',l:'🍐 Poire'},{id:'noyaux',l:'🍑 Noyaux'}];
  var allowed=FLIPO_STABS['trait'];
  var tabs=allowed&&allowed.length?allTabs.filter(function(t){return allowed.indexOf(t.id)>=0;}):allTabs;
  if(!tabs.length)tabs=allTabs;
  if(!tabs.find(function(t){return t.id===S.tSub;})&&tabs.length)S.tSub=tabs[0].id;
  return `<div class="stabs">${tabs.map(t=>`<button class="stab${S.tSub===t.id?' act':''}" onclick="setTSub('${t.id}')">${t.l}</button>`).join('')}</div>`;
}
function setTSub(v){S.tSub=v;const f=saveFocus();$('panel-trait').innerHTML=buildTrait();restFocus(f);}
function buildTC(){
  if(S.tSub==='pc')return buildPC();
  if(S.tSub==='pomme')return buildDist('pomme');
  if(S.tSub==='poire')return buildDist('poire');
  return buildDist('noyaux');
}

function updDose(type,ri,val){
  const dv=parseFloat(val)||0;
  const pc=type==='pom'?S.pcPom:type==='poi'?S.pcPoi:S.pcNoy;
  const d=pc[ri].d;
  const pf=type==='pom'?'dp':type==='poi'?'dq':'dn';
  const surf=type==='pom'?22.76:type==='poi'?10.54:2;
  d[2]=dv;d[0]=R2(dv/5);d[1]=R2(dv/2);d[3]=R2(dv*2);d[4]=R2(dv*3);d[5]=R2(dv*4);d[6]=R2(dv*surf);
  const e6=$(`${pf}-${ri}-6`);if(e6)e6.textContent=d[6]||0;
  if(type!=='noy'){
    const blocs=type==='pom'?S.bp:S.br;
    const dist=type==='pom'?S.pd:S.qd;
    const cult=type==='pom'?'pomme':'poire';
    blocs.forEach((_,bi)=>{if(dist[`${ri}-${bi}`]===undefined){const e=$(`dc-${cult}-${ri}-${bi}`);if(e)e.value=R2(dv*blocs[bi].s);}});
    updDistTotal(cult,ri);
  }
}
function addProdPC(type){
  if(type==='pom')S.pcPom.push({p:'',d:[0,0,0,0,0,0,0]});
  else if(type==='poi')S.pcPoi.push({p:'',d:[0,0,0,0,0,0,0]});
  else S.pcNoy.push({p:'',d:[0,0,0,0,0,0,0]});
  saveLS();const f=saveFocus();$('panel-trait').innerHTML=buildTrait();restFocus(f);
}
function deleteProdPC(type,ri){
  const norm=type==='pom'||type==='pomme'?'pomme':type==='poi'||type==='poire'?'poire':'noyaux';
  const pc=getPcArr(norm);
  const dist=getDistArr(norm);
  pc.splice(ri,1);
  // Re-indexer les clés de distribution
  const newDist={};
  Object.keys(dist).forEach(k=>{
    const parts=k.split('-');const r=parseInt(parts[0]);const b=parseInt(parts[1]);
    if(r===ri)return;
    const newR=r>ri?r-1:r;
    newDist[`${newR}-${b}`]=dist[k];
  });
  if(norm==='pomme')S.pd=newDist;
  else if(norm==='poire')S.qd=newDist;
  else S.nd=newDist;
  saveLS();const f=saveFocus();$('panel-trait').innerHTML=buildTrait();restFocus(f);
}

function buildDist(culture){

  blocs.forEach(b=>h+=`<th class="am">${es(b.n)}<br><small style="font-weight:400;color:var(--mu)">${b.s}ha${b.note?' · '+es(b.note):''}</small></th>`);

  // Ligne eau
  const totEau=blocs.reduce((s,b)=>s+eau(b.s),0);
  h+=`<tr style="background:var(--gl);font-size:11px"><td style="color:var(--gd);font-weight:600">💧 Eau calculée</td><td style="color:var(--mu)">500L/ha</td>`;

  h+=`<td class="f" style="font-weight:700">${totEau} L</td></tr>`;
  // Produits
  pc.forEach((row,ri)=>{
    const totRow=blocs.reduce((s,b,bi)=>{const k=`${ri}-${bi}`;return s+(dist[k]!==undefined?dist[k]:R2(row.d[2]*b.s));},0);
    h+=`<tr><td><input class="w120" id="pname-${culture}-${ri}" value="${es(row.p)}" list="prod-list" onchange="getPcArr('${culture}')[${ri}].p=this.value;saveLS()" oninput="var d=lookupDose(this.value);if(d){var e=$('base-${culture}-${ri}');if(e)e.value=d;updBase('${culture}',${ri},d)}"></td><td><input class="w60" id="base-${culture}-${ri}" value="${row.d[2]??''}" onchange="updBase('${culture}',${ri},this.value)"></td>`;

      h+=`<input class="w60" id="dc-${culture}-${ri}-${bi}" value="${val}" onchange="setMD('${culture}',${ri},${bi},this.value)">`;

    });

  });

  blocs.forEach((b,i)=>{
    const cout=coutBloc(culture,i);
    h+=`<tr>
      <td><input class="w120" id="bn-${culture}-${i}" value="${es(b.n)}" onchange="updBN('${culture}',${i},this.value)"></td>
      <td><input class="w60" id="bs-${culture}-${i}" value="${b.s}" onchange="updBS('${culture}',${i},this.value)"></td>
      <td><input class="w120" id="bnote-${culture}-${i}" value="${es(b.note||'')}" placeholder="note..." onchange="getBlocArr('${culture}')[${i}].note=this.value;saveLS()"></td>
      <td class="f" id="beau-${culture}-${i}">${eau(b.s)} L</td>
      <td class="cost" id="bcout-${culture}-${i}">${cout>0?cout.toLocaleString('fr-FR',{maximumFractionDigits:2})+' €':'—'}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  h+=`<div class="btns">
    <button class="btn add" onclick="addBloc('${culture}')">+ Ajouter un bloc</button>
    <button class="btn add" onclick="addProdDist('${culture}')">+ Ajouter un produit</button>
    ${canPDF?`<button class="btn pdf" onclick="pdfDist('${culture}')">⬇ PDF ${culture==='pomme'?'Pomme':'Poire'}</button>
    <button class="btn mail" onclick="emailDist('${culture}')">✉ E-mail</button>`:''}
    <button class="btn ok" onclick="openModal('${culture}')">✓ Valider le traitement</button>
  </div>`;
  return h;
}
function getBlocArr(culture){return culture==='pomme'?S.bp:culture==='poire'?S.br:S.bn;}
function getPcArr(culture){return culture==='pomme'?S.pcPom:culture==='poire'?S.pcPoi:S.pcNoy;}
function getDistArr(culture){return culture==='pomme'?S.pd:culture==='poire'?S.qd:S.nd;}

function updBase(culture,ri,val){
  const dv=parseFloat(val)||0;
  const pc=getPcArr(culture);
  pc[ri].d[2]=dv;pc[ri].d[0]=R2(dv/5);pc[ri].d[1]=R2(dv/2);pc[ri].d[3]=R2(dv*2);pc[ri].d[4]=R2(dv*3);pc[ri].d[5]=R2(dv*4);
  const blocs=getBlocArr(culture);const dist=getDistArr(culture);
  blocs.forEach((b,bi)=>{if(dist[`${ri}-${bi}`]===undefined){const e=$(`dc-${culture}-${ri}-${bi}`);if(e)e.value=R2(dv*b.s);}});
  updDistTotal(culture,ri);updBlocCouts(culture);
  const pf=culture==='pomme'?'dp':culture==='poire'?'dq':null;
  if(pf)[3,4,5].forEach(ci=>{const e=$(`${pf}-${ri}-${ci}`);if(e)e.textContent=pc[ri].d[ci]||0;});
  saveLS();
}
function updDistTotal(culture,ri){
  const blocs=getBlocArr(culture);const dist=getDistArr(culture);const pc=getPcArr(culture);
  const tot=blocs.reduce((s,b,bi)=>{const k=`${ri}-${bi}`;return s+(dist[k]!==undefined?dist[k]:R2(pc[ri].d[2]*b.s));},0);
  const e=$(`dt-${culture}-${ri}`);if(e)e.textContent=R2(tot);
}
function updBlocCouts(culture){
  const blocs=getBlocArr(culture);
  blocs.forEach((_,bi)=>{
    const e=$(`bcout-${culture}-${bi}`);
    if(e){const c=coutBloc(culture,bi);e.textContent=c>0?c.toLocaleString('fr-FR',{maximumFractionDigits:2})+' €':'—';}
  });
}
function setMD(culture,ri,bi,val){
  const v=parseFloat(val)||0;
  getDistArr(culture)[`${ri}-${bi}`]=v;
  const cell=$(`dcc-${culture}-${ri}-${bi}`);
  if(cell&&!cell.querySelector('.rb')){
    const btn=document.createElement('button');btn.className='rb';btn.textContent='↺';btn.title='Réinitialiser';
    btn.onclick=()=>resetMD(culture,ri,bi);cell.className='mn';cell.appendChild(btn);
  }
  updDistTotal(culture,ri);updBlocCouts(culture);saveLS();
}
function resetMD(culture,ri,bi){
  const dist=getDistArr(culture);delete dist[`${ri}-${bi}`];
  const blocs=getBlocArr(culture);const pc=getPcArr(culture);
  const auto=R2(pc[ri].d[2]*blocs[bi].s);
  const cell=$(`dcc-${culture}-${ri}-${bi}`);
  if(cell){cell.className='f';cell.innerHTML=`<input class="w60" id="dc-${culture}-${ri}-${bi}" value="${auto}" onchange="setMD('${culture}',${ri},${bi},this.value)">`;}
  updDistTotal(culture,ri);updBlocCouts(culture);saveLS();
}
function updBN(culture,i,v){getBlocArr(culture)[i].n=v;saveLS();}
function updBS(culture,i,val){
  const v=parseFloat(val)||0;const bl=getBlocArr(culture);bl[i].s=v;
  const e=$(`beau-${culture}-${i}`);if(e)e.textContent=eau(v)+' L';
  const pc=getPcArr(culture);const dist=getDistArr(culture);
  pc.forEach((_,ri)=>{if(dist[`${ri}-${i}`]===undefined){const e=$(`dc-${culture}-${ri}-${i}`);if(e)e.value=R2(pc[ri].d[2]*v);}updDistTotal(culture,ri);});
  updBlocCouts(culture);saveLS();
}
function addBloc(culture){getBlocArr(culture).push({n:'Nouveau bloc',s:0,note:''});saveLS();const f=saveFocus();$('panel-trait').innerHTML=buildTrait();restFocus(f);}
function addProdDist(culture){
  getPcArr(culture).push({p:'',d:[0,0,0,0,0,0,0]});
  saveLS();const f=saveFocus();$('panel-trait').innerHTML=buildTrait();restFocus(f);
}
function buildBlocsWithDoses(culture){
  const blocs=getBlocArr(culture);const dist=getDistArr(culture);const pc=getPcArr(culture);
  return blocs.map((b,bi)=>{const _d={};pc.forEach((row,ri)=>{const k=`${ri}-${bi}`;_d[row.p]=dist[k]!==undefined?dist[k]:R2(row.d[2]*b.s);});return{...b,_d};});
}
function pdfDist(culture){
  const pc=getPcArr(culture);
  doPDF(culture==='pomme'?'🍎 Pomme':'🍐 Poire',pc,buildBlocsWithDoses(culture));
}
function emailDist(culture){
  const pc=getPcArr(culture);
  doEmail(culture==='pomme'?'Pomme':'Poire',pc,buildBlocsWithDoses(culture));
}
// Modal validation
function openModal(culture){
  const blocs=getBlocArr(culture);const dist=getDistArr(culture);const pc=getPcArr(culture);
  const canPDF=culture!=='noyaux';
  let h=`<div class="mbg"><div class="mc"><div class="mh"><h2>✓ Traitement validé — ${culture==='pomme'?'🍎 Pomme':culture==='poire'?'🍐 Poire':'🍑 Noyaux'}</h2><button class="mclose" onclick="$('modal-root').innerHTML=''">✕ Fermer</button></div>`;

    h+=`<div class="tw"><table><thead><tr><th>Produit</th><th class="am">Dose (L)</th></tr></thead><tbody>`;
    pc.forEach((row,ri)=>{const k=`${ri}-${bi}`;const isMn=dist[k]!==undefined;const val=isMn?dist[k]:R2(row.d[2]*b.s);h+=`<tr><td>${es(row.p)}</td><td class="${isMn?'mn':'f'}">${val}</td></tr>`;});

  h+=`<div class="mfoot">

  $('modal-root').innerHTML=h;
}

// ─── SAISIE RAPIDE ────────────────────────────
function buildSaisie(){
  const pomVars=S.pomR.map(r=>r.v);
  const poiVars=S.poiR.map(r=>r.v);
  const vars=S.entCult==='pomme'?pomVars:poiVars;
  const today=new Date();
  const todayStr=String(today.getDate()).padStart(2,'0')+'/'+String(today.getMonth()+1).padStart(2,'0');
  const kgDef=S.entCult==='pomme'?300:440;
  let h=`<div class="cult-sel">
    <button class="cult-btn pom${S.entCult==='pomme'?' act':''}" onclick="setEntCult('pomme')">🍎 Pomme</button>
    <button class="cult-btn poi${S.entCult==='poire'?' act':''}" onclick="setEntCult('poire')">🍐 Poire</button>
  </div>`;
  h+=`<div class="entry-form">
    <p style="font-weight:600;font-size:13px;margin-bottom:12px;color:var(--gd)">Ajouter une récolte</p>
    <div class="form-row">
      <div class="form-field">
        <label>Date (JJ/MM)</label>
        <input type="text" id="ent-date" value="${todayStr}" placeholder="15/09" style="width:90px">
      </div>
      <div class="form-field" style="flex:2">
        <label>Variété</label>
        <select id="ent-var" style="min-width:160px;padding:7px 10px;border:1px solid var(--brd);border-radius:7px;font-size:13px;background:var(--wh)">
          ${vars.map(v=>`<option value="${es(v)}">${es(v)}</option>`).join('')}
          <option value="__new__">+ Nouvelle variété...</option>
        </select>
      </div>
      <div class="form-field" id="new-var-field" class="hidden" style="display:none;flex:2">
        <label>Nom de la variété</label>
        <input type="text" id="ent-newvar" placeholder="Nom variété" style="min-width:140px">
      </div>
      <div class="form-field">
        <label>Palox</label>
        <input type="number" id="ent-palox" value="" min="0" step="0.5" placeholder="0" style="width:80px">
      </div>
      <div class="form-field">
        <label>kg/palox</label>
        <input type="number" id="ent-kg" value="${kgDef}" min="0" step="1" style="width:80px">
      </div>
      <div class="form-field" style="flex:2">
        <label>Bâtiment</label>
        <select id="ent-bat" style="min-width:130px;padding:7px 10px;border:1px solid var(--brd);border-radius:7px;font-size:13px;background:var(--wh)" onchange="updFrigoSelect()">
          <option value="">— aucun —</option>
          ${S.bats.map(b=>`<option value="${es(b.id)}">${es(b.nom)}</option>`).join('')}
        </select>
      </div>
      <div class="form-field" style="flex:2">
        <label>Frigo</label>
        <select id="ent-fri" style="min-width:130px;padding:7px 10px;border:1px solid var(--brd);border-radius:7px;font-size:13px;background:var(--wh)">
          <option value="">— aucun —</option>
        </select>
      </div>
      <div class="form-field" style="justify-content:flex-end">
        <label>&nbsp;</label>
        <button class="btn ok" onclick="addEntry()" style="padding:8px 18px;font-size:13px">+ Ajouter</button>
      </div>
    </div>
  </div>`;
  // Journal
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <span style="font-weight:600;font-size:13px">Journal des saisies (${S.entries.length})</span>
    ${S.entries.length>0?`<button class="btn del" onclick="if(confirm('Supprimer toutes les saisies ?'))clearEntries()">🗑 Tout effacer</button>`:''}
  </div>`;
  if(!S.entries.length){
    h+=`<div class="empty-journal">Aucune saisie pour le moment.<br>Utilisez le formulaire ci-dessus pour enregistrer vos récoltes.</div>`;
  } else {
    h+=`<div style="max-height:400px;overflow-y:auto">`;
    S.entries.forEach(e=>{

      const kg=e.palox*(e.kgPalox||0);
      const tsStr=e.ts?new Date(e.ts).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';

function setEntCult(cult){S.entCult=cult;const f=saveFocus();$('cvw').innerHTML=buildSaisie();restFocus(f);}

function updFrigoSelect(){
  const batId=$('ent-bat')?$('ent-bat').value:'';
  const sel=$('ent-fri');if(!sel)return;
  const bat=S.bats.find(b=>b.id===batId);
  sel.innerHTML='<option value="">— aucun —</option>';
  if(bat)bat.frigos.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.nom;sel.appendChild(o);});
}
function addEntry(){
  const dateEl=$('ent-date'),varEl=$('ent-var'),paloxEl=$('ent-palox'),kgEl=$('ent-kg'),newVarEl=$('ent-newvar');
  const date=(dateEl?dateEl.value:'').trim();
  const varSel=varEl?varEl.value:'';
  const variete=varSel==='__new__'?(newVarEl?newVarEl.value.trim():''):varSel;
  const palox=parseFloat(paloxEl?paloxEl.value:0)||0;
  const kgPalox=parseFloat(kgEl?kgEl.value:0)||0;
  const batId=$('ent-bat')?$('ent-bat').value:'';
  const friId=$('ent-fri')?$('ent-fri').value:'';
  if(!date||!variete||palox<=0){alert('Renseignez la date, la variété et le nombre de palox (> 0).');return;}
  if(!/^\d{2}\/\d{2}$/.test(date)){alert('Format de date invalide. Utilisez JJ/MM (ex: 15/09)');return;}

  const cult=S.entCult;
  const dates=cult==='pomme'?DATES_POM:DATES_POI;
  const rows=cult==='pomme'?S.pomR:S.poiR;

  let di=dates.indexOf(date);
  if(di===-1){
    dates.push(date);
    dates.sort((a,b)=>{const pa=a.split('/'),pb=b.split('/');return(+pa[1]*100+ +pa[0])-(+pb[1]*100+ +pb[0]);});
    di=dates.indexOf(date);
    rows.forEach(r=>{r.d.splice(di,0,0);});
  }

  let ri=rows.findIndex(r=>r.v.toLowerCase()===variete.toLowerCase());
  if(ri===-1){rows.push({v:variete,d:new Array(dates.length).fill(0)});ri=rows.length-1;}
  while(rows[ri].d.length<dates.length)rows[ri].d.push(0);
  rows[ri].d[di]=(rows[ri].d[di]||0)+palox;
  rows.sort((a,b)=>a.v.localeCompare(b.v,'fr'));

  const entry={id:Date.now(),cult,date,variete,palox,kgPalox,ts:new Date().toISOString()};
  if(batId)entry.bat=batId;
  if(friId)entry.fri=friId;
  S.entries.unshift(entry);
  saveLS();
  updCeilStats();
  const f=saveFocus();$('cvw').innerHTML=buildSaisie();restFocus(f);
}

function deleteEntry(id){
  const idx=S.entries.findIndex(e=>e.id===id);
  if(idx===-1)return;
  const entry=S.entries[idx];
  const dates=entry.cult==='pomme'?DATES_POM:DATES_POI;
  const rows=entry.cult==='pomme'?S.pomR:S.poiR;
  const di=dates.indexOf(entry.date);
  const ri=rows.findIndex(r=>r.v.toLowerCase()===entry.variete.toLowerCase());
  if(di!==-1&&ri!==-1)rows[ri].d[di]=Math.max(0,(rows[ri].d[di]||0)-entry.palox);
  S.entries.splice(idx,1);
  saveLS();
  updCeilStats();
  const f=saveFocus();$('cvw').innerHTML=buildSaisie();restFocus(f);
}
function clearEntries(){
  // Subtract all entries from rows
  S.entries.forEach(entry=>{
    const dates=entry.cult==='pomme'?DATES_POM:DATES_POI;
    const rows=entry.cult==='pomme'?S.pomR:S.poiR;
    const di=dates.indexOf(entry.date);
    const ri=rows.findIndex(r=>r.v.toLowerCase()===entry.variete.toLowerCase());
    if(di!==-1&&ri!==-1)rows[ri].d[di]=Math.max(0,(rows[ri].d[di]||0)-entry.palox);
  });
  S.entries=[];saveLS();updCeilStats();
  const f=saveFocus();$('cvw').innerHTML=buildSaisie();restFocus(f);
}

function setWin(v){S.cwin=v;const f=saveFocus();$('cvw').innerHTML=buildCourbe();setTimeout(drawChart,60);restFocus(f);}
function drawChart(){
  const c=$('chart-container');if(!c)return;
  const allDates=[...new Set([...DATES_POM,...DATES_POI])].sort((a,b)=>{const pa=a.split('/');const pb=b.split('/');return(+pa[1]*100+ +pa[0])-(+pb[1]*100+ +pb[0]);});
  const dateTotP={},dateTotQ={};
  DATES_POM.forEach((d,i)=>dateTotP[d]=(dateTotP[d]||0)+S.pomR.reduce((s,r)=>s+(r.d[i]||0),0));
  DATES_POI.forEach((d,i)=>dateTotQ[d]=(dateTotQ[d]||0)+S.poiR.reduce((s,r)=>s+(r.d[i]||0),0));
  let data=[];
  if(S.cwin===0){data=allDates.map(d=>({l:d,p:Math.round((dateTotP[d]||0)*10)/10,q:Math.round((dateTotQ[d]||0)*10)/10}));}
  else{
    for(let i=0;i<allDates.length;i+=S.cwin){
      const chunk=allDates.slice(i,i+S.cwin);
      const label=chunk.length>1?chunk[0]+'→'+chunk[chunk.length-1]:chunk[0];
      data.push({l:label,p:Math.round(chunk.reduce((s,d)=>s+(dateTotP[d]||0),0)*10)/10,q:Math.round(chunk.reduce((s,d)=>s+(dateTotQ[d]||0),0)*10)/10});
    }
  }
  const W=Math.max(c.clientWidth||700,data.length*26);
  const H=260,pl=45,pr=20,pt=10,pb=65,cw=W-pl-pr,ch=H-pt-pb,n=data.length;
  const bw=Math.max(5,Math.min(22,(cw/n)*0.38));
  const maxV=Math.max(...data.map(d=>Math.max(d.p,d.q)),1);
  const ys=v=>pt+ch-(v/maxV)*ch;const xs=i=>pl+(i+0.5)*(cw/n);
  const tks=[0,.25,.5,.75,1].map(f=>Math.round(f*maxV*10)/10);
  let svg=`<svg width="${W}" height="${H}"><rect width="${W}" height="${H}" fill="transparent"/>`;
  tks.forEach(v=>{const y=ys(v);svg+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#e0e0dc" stroke-width="1"/>`;svg+=`<text x="${pl-4}" y="${y+4}" text-anchor="end" font-size="10" fill="#888">${v}</text>`;});
  data.forEach((d,i)=>{
    const x=xs(i);
    const ph=Math.max((d.p/maxV)*ch,1);svg+=`<rect x="${x-bw}" y="${pt+ch-ph}" width="${bw}" height="${ph}" fill="#5a8a1a" rx="2" opacity=".85"><title>${d.l}: ${d.p} palox pomme</title></rect>`;
    const qh=Math.max((d.q/maxV)*ch,1);svg+=`<rect x="${x}" y="${pt+ch-qh}" width="${bw}" height="${qh}" fill="#185FA5" rx="2" opacity=".85"><title>${d.l}: ${d.q} palox poire</title></rect>`;
    svg+=`<text transform="rotate(-45,${x},${pt+ch+14})" x="${x}" y="${pt+ch+14}" text-anchor="end" font-size="9" fill="#888">${d.l}</text>`;
  });
  svg+=`</svg>`;c.innerHTML=`<div style="overflow-x:auto">${svg}</div>`;
}

function buildTableau(){
  let h=`<div class="info" style="margin-bottom:10px">Tableau complet. Vous pouvez modifier les cellules directement. Pour les nouvelles saisies en cours de saison, utilisez l'onglet <strong>📝 Saisie</strong>.</div>`;

  h+=buildCeilTable('pom');h+=buildCeilTable('poi');
  return h;
}
function buildCeilTable(type){
  const rows=type==='pom'?S.pomR:S.poiR;
  const dates=type==='pom'?DATES_POM:DATES_POI;
  const label=type==='pom'?'🍎 Pommes (palox)':'🍐 Poires (palox)';
  const color=type==='pom'?'#3a6e11':'#185FA5';
  let h=`<p style="font-weight:700;font-size:12px;margin-bottom:6px;color:${color}">${label}</p>`;
  h+=`<div class="tw fh"><table><thead><tr><th style="min-width:32px"></th><th style="min-width:110px">Variété</th><th class="am" style="min-width:60px">Total</th>`;
  if(type==='pom')h+=`<th class="am" style="min-width:72px">Poids (kg)</th>`;
  dates.forEach(d=>h+=`<th style="min-width:40px;font-size:10px">${d}</th>`);
  h+=`</tr></thead><tbody>`;
  rows.forEach((row,ri)=>{
    const tot=sm(row.d);
    h+=`<tr><td><button class="btn del" style="padding:2px 5px;font-size:12px;min-height:28px" onclick="deleteVar('${type}',${ri})">🗑</button></td>`;
    h+=`<td><input class="w100" id="${type}v-${ri}" value="${es(row.v)}" onchange="updVN('${type}',${ri},this.value)"></td>`;
    h+=`<td class="f" id="${type}t-${ri}">${Math.round(tot)}</td>`;
    if(type==='pom')h+=`<td class="f" id="${type}k-${ri}">${(Math.round(tot)*300).toLocaleString('fr-FR')}</td>`;
    row.d.forEach((v,ci)=>h+=`<td><input class="w48" id="${type}c-${ri}-${ci}" value="${v||''}" onchange="updC('${type}',${ri},${ci},this.value)"></td>`);
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  h+=`<div class="btns"><button class="btn add" onclick="addVar('${type}')">+ Ajouter variété</button></div><br>`;
  return h;
}
function deleteVar(type,ri){
  if(!confirm('Supprimer cette variété ?'))return;
  const rows=type==='pom'?S.pomR:S.poiR;
  rows.splice(ri,1);
  saveLS();
  const f=saveFocus();$('cvw').innerHTML=buildCVw();restFocus(f);
}
function updVN(type,ri,v){(type==='pom'?S.pomR:S.poiR)[ri].v=v;saveLS();}
function updC(type,ri,ci,val){
  const rows=type==='pom'?S.pomR:S.poiR;
  rows[ri].d[ci]=parseFloat(val)||0;
  const tot=Math.round(sm(rows[ri].d));
  const te=$(type+'t-'+ri);if(te)te.textContent=tot;
  if(type==='pom'){const ke=$(type+'k-'+ri);if(ke)ke.textContent=(tot*300).toLocaleString('fr-FR');}
  updCeilStats();saveLS();
}
function addVar(type){
  const rows=type==='pom'?S.pomR:S.poiR;
  rows.push({v:'Nouvelle variété',d:new Array((type==='pom'?DATES_POM:DATES_POI).length).fill(0)});
  rows.sort((a,b)=>a.v.localeCompare(b.v,'fr'));

}

  h+=`<tr><td>Pomme</td><td class="f" id="rp-tot">${tP}</td><td><input class="w80" id="rp-fac" value="${S.facPom.palox||''}" placeholder="0" onchange="S.facPom.palox=this.value;saveLS();updRestePalox()"></td><td class="f" id="rp-rest">${tP-(parseFloat(S.facPom.palox)||0)}</td></tr>`;

function updFPx(key,i,val){if(S.facPrix){S.facPrix[key][i]=parseFloat(val)||0;saveLS();}}
function updFac(key,val){

function updRestePalox(){

const DATES_POM_ORIG=["20/08","22/08","26/08","27/08","28/08","29/08","01/09","02/09","03/09","04/09","05/09","08/09","09/09","10/09","11/09","12/09","13/09","15/09","16/09","17/09","18/09","19/09","22/09","23/09","24/09","26/09","29/09","30/09","01/10","02/10","03/10","08/10","09/10","10/10","14/10","15/10","16/10","17/10","20/10","21/10","30/10","03/11","04/11","05/11"];

function cloturerAnnee(){
  const saison=S.saison||'2026/2027';
  const tP=Math.round(sm(S.pomR.map(r=>sm(r.d))));
  const tQ=Math.round(sm(S.poiR.map(r=>sm(r.d))));
  const ok=confirm(`🗓 Clôturer la saison ${saison} ?\n\nRécapitulatif :\n• Pommes : ${tP} palox — ${(tP*300).toLocaleString('fr-FR')} kg\n• Poires : ${tQ} palox — ${(tQ*440).toLocaleString('fr-FR')} kg\n\nCette action va :\n✓ Télécharger un fichier CSV récapitulatif\n✓ Réinitialiser les données pour la nouvelle saison\n\n⚠️ Action irréversible. Continuer ?`);
  if(!ok)return;
  const ok2=confirm(`Dernière confirmation : clôturer définitivement la saison ${saison} ?`);
  if(!ok2)return;

  // Générer CSV
  let csv=`\uFEFFSaison ${saison} — Récapitulatif Cueillette Flipo\n\n`;
  csv+=`Culture,Variété,Date,Palox,Poids estimé (kg)\n`;
  DATES_POM.forEach((date,di)=>{S.pomR.forEach(row=>{if((row.d[di]||0)>0)csv+=`Pomme,"${row.v}",${date},${row.d[di]},${row.d[di]*300}\n`;});});
  DATES_POI.forEach((date,di)=>{S.poiR.forEach(row=>{if((row.d[di]||0)>0)csv+=`Poire,"${row.v}",${date},${row.d[di]},${row.d[di]*440}\n`;});});
  csv+=`\nTOTAL,Pomme,,${tP},${tP*300}\n`;
  csv+=`TOTAL,Poire,,${tQ},${tQ*440}\n`;
  csv+=`TOTAL,Général,,${tP+tQ},${tP*300+tQ*440}\n`;

  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`Flipo_Verger_${saison.replace('/','_')}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);

  // Calcul nouvelle saison
  const parts=saison.split('/');
  const newSaison=`${parseInt(parts[0])+1}/${parseInt(parts[1])+1}`;

  // Réinitialiser les données (garder les variétés, remettre à zéro)
  const varP=S.pomR.map(r=>r.v);const varQ=S.poiR.map(r=>r.v);
  DATES_POM.length=0;DATES_POM_ORIG.forEach(d=>DATES_POM.push(d));
  DATES_POI.length=0;DATES_POI_ORIG.forEach(d=>DATES_POI.push(d));
  S.pomR=varP.map(v=>({v,d:new Array(44).fill(0)}));
  S.poiR=varQ.map(v=>({v,d:new Array(44).fill(0)}));
  S.entries=[];S.facPom={};S.facPoi={};S.facPrix=null;
  S.saison=newSaison;
  saveLS();

  alert(`✅ Saison ${saison} clôturée !\nNouvelle saison : ${newSaison}\n\nLe fichier CSV a été téléchargé — sauvegardez-le sur votre Drive.`);
  const ph=document.querySelector('.htxt p');if(ph)ph.textContent=`Saison ${newSaison}`;
  initCueill();
}

  S.tarif.forEach((row,ri)=>{

      <td><input class="w60" id="td1-${ri}" value="${row.d1}" onchange="updTP(${ri},'d1',this.value)"></td>
      <td><input class="w60" id="td2-${ri}" value="${row.d2}" onchange="updTP(${ri},'d2',this.value)"></td>
      <td class="f" id="tt1-${ri}">${(row.t1||0).toFixed(2)}</td>

  h+=`<div class="btns"><button class="btn add" onclick="addTarif()">+ Ajouter un produit</button></div>`;

}
function updTP(ri,field,val){
  if(field!=='p')S.tarif[ri][field]=parseFloat(val)||0;else S.tarif[ri][field]=val;
  S.tarif[ri].t1=R2((S.tarif[ri].px||0)*(S.tarif[ri].d1||0));
  S.tarif[ri].t2=R2((S.tarif[ri].px||0)*(S.tarif[ri].d2||0));
  const e1=$('tt1-'+ri);if(e1)e1.textContent=(S.tarif[ri].t1||0).toFixed(2);
  const e2=$('tt2-'+ri);if(e2)e2.textContent=(S.tarif[ri].t2||0).toFixed(2);
  const tT1=R2(S.tarif.reduce((s,r)=>s+(r.t1||0),0));
  const tT2=R2(S.tarif.reduce((s,r)=>s+(r.t2||0),0));
  setText('pht1',fr(tT1));setText('pht2',fr(tT2));
  const ee=$('pheco');if(ee){ee.textContent=fr(R2(tT1-tT2));ee.style.color=tT1-tT2>0?'var(--gd)':'#a32d2d';}
}
function addTarif(){
  S.tarif.push({p:'Nouveau produit',px:0,d1:0,d2:0,t1:0,t2:0});

}

        </select>
      </div>
      <div class="form-field">
        <label>Frigo (optionnel)</label>
        <select id="ae-frigo" style="width:140px;padding:7px 10px;border:1px solid var(--brd);border-radius:7px;font-size:13px;background:var(--wh)">
          <option value="">Aucun</option>
        </select>
      </div>
      <div class="form-field">
        <label>&nbsp;</label>
        <button class="btn ok" onclick="addAchatExt()">+ Ajouter</button>
      </div>
    </div>
  </div>`;

  // Tableau des achats extérieurs
  if(S.achatsExt.length>0){
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-weight:600;font-size:13px">Achats enregistrés (${S.achatsExt.length})</span>
    </div>`;
    h+=`<div class="tw fh"><table><thead><tr>
      <th>Culture</th>
      <th>Variété</th>
      <th>Date</th>
      <th>Palox</th>
      <th>Bâtiment</th>
      <th>Frigo</th>
      <th></th>
    </tr></thead><tbody>`;
    S.achatsExt.forEach((ae,ai)=>{
      const bat=S.bats.find(b=>b.id===ae.batId);
      const fri=bat&&ae.frigoId?bat.frigos.find(f=>f.id===ae.frigoId):null;
      h+=`<tr>
        <td>${es(ae.cult==='pomme'?'Pomme':'Poire')}</td>
        <td>${es(ae.variete||'')}</td>
        <td>${es(ae.date||'')}</td>
        <td>${ae.palox||0}</td>
        <td>${es(bat?bat.nom:'—')}</td>
        <td>${es(fri?fri.nom:'—')}</td>
        <td><button class="btn del" onclick="deleteAchatExt(${ai})" ${FLIPO_CAN_DELETE?'':'disabled'} title="${FLIPO_CAN_DELETE?'Supprimer':'Suppression réservée aux administrateurs'}">🗑</button></td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  } else {
    h+=`<div class="empty-journal">Aucun achat extérieur pour le moment.</div>`;
  }

  return h;
}
function addBat(){
  const id='b'+Date.now();
  S.bats.push({id,nom:'Nouveau bâtiment',frigos:[]});
  saveLS();initStock();
}
function deleteBat(bi){
  S.bats.splice(bi,1);
  saveLS();initStock();
}
function addFrigo(bi){
  const id='f'+Date.now();
  S.bats[bi].frigos.push({id,nom:'Nouveau frigo'});
  saveLS();initStock();
}
function deleteFrigo(bi,fi){
  S.bats[bi].frigos.splice(fi,1);
  saveLS();initStock();
}

// ─── Achats extérieurs ──────────────────────────
function addAchatExt(){
  const cultEl=$('ae-cult'),varEl=$('ae-var'),dateEl=$('ae-date'),paloxEl=$('ae-palox'),batEl=$('ae-bat'),frigoEl=$('ae-frigo');
  if(!cultEl||!varEl||!dateEl||!paloxEl||!batEl)return;
  const cult=cultEl.value||'pomme';
  const variete=(varEl.value||'').trim();
  const date=(dateEl.value||'').trim();
  const palox=parseFloat(paloxEl.value)||0;
  const batIdx=parseInt(batEl.value)||0;
  const friIdx=frigoEl.value?parseInt(frigoEl.value):null;

  if(!variete||!date||palox<=0){alert('Renseignez la variété, la date et le nombre de palox (> 0).');return;}
  if(!/^\d{2}\/\d{2}$/.test(date)){alert('Format de date invalide. Utilisez JJ/MM (ex: 15/09)');return;}

  const bat=S.bats[batIdx];
  const batId=bat?bat.id:null;
  let frigoId=null;
  if(friIdx!==null&&bat&&bat.frigos[friIdx]){frigoId=bat.frigos[friIdx].id;}

  const ae={id:Date.now(),cult,variete,date,palox,batId,frigoId};
  S.achatsExt.push(ae);
  saveLS();

  // Reset form
  varEl.value='';dateEl.value='';paloxEl.value='';
  cultEl.focus();
  const f=saveFocus();initStock();restFocus(f);
}

function deleteAchatExt(ai){
  if(!FLIPO_CAN_DELETE){alert('Suppression réservée aux administrateurs');return;}
  S.achatsExt.splice(ai,1);
  saveLS();
  const f=saveFocus();initStock();restFocus(f);
}

// Mettre à jour le select des frigos quand on change de bâtiment
function updateFrigoSelectInStock(){
  const batEl=$('ae-bat'),frigoEl=$('ae-frigo');
  if(!batEl||!frigoEl)return;
  const batIdx=parseInt(batEl.value)||0;
  const bat=S.bats[batIdx];
  frigoEl.innerHTML='<option value="">Aucun</option>';
  if(bat&&bat.frigos.length>0){
    bat.frigos.forEach((f,fi)=>{
      const opt=document.createElement('option');
      opt.value=fi;
      opt.textContent=f.nom;
      frigoEl.appendChild(opt);
    });
  }
}

var FLIPO_STABS={};
// ─── Auth ────────────────────────────────────────────────
(function(){
  var sess=null;
  try{sess=JSON.parse(sessionStorage.getItem('flipo-session')||'null');}catch(e){}
  if(!sess){location.href='flipo-login.html';return;}
  var mp=sess.perms&&sess.perms['verger'];
  if(!sess.isAdmin&&(!mp||!mp.enabled)){location.href='index.html';return;}
  if(sess.isAdmin)return;
  var tabs=mp.tabs||{};
  var tabIds=['trait','cueill','stock','phyto'];
  var first=null;
  tabIds.forEach(function(tid){
    var tp=tabs[tid];
    if(!tp||!tp.enabled){
      var b=document.getElementById('tab-'+tid);
      if(b)b.style.display='none';
      var p=document.getElementById('panel-'+tid);
      if(p)p.classList.add('hidden');
    }else{
      if(!first)first=tid;
      if(tp.stabs&&tp.stabs.length>0)FLIPO_STABS[tid]=tp.stabs;
    }
  });
  window._vergFirst=first||'trait';
})();
loadLS();
rebuildProdList();
initTrait();
initCueill();
initPhyto();
(function(){
  var f=window._vergFirst||'trait';
  var b=document.getElementById('tab-'+f);
  if(b)setTab(f,b);
  setSyncStatus('ok');
})();
